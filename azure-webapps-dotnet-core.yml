name: Build and deploy Node.js app to Azure Web App - treat

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: treat
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '20.x'
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

permissions:
  id-token: write
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true

      - name: Install dependencies and build
        run: npm install && npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  migrate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Note: Database migrations for Node.js (e.g., Prisma/Sequelize) should be added here
      - name: Placeholder for DB Migrations
        run: echo "Running migrations..."

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment:
      name: 'Staging'
      url: ${{ steps.deploy-to-staging.outputs.webapp-url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Staging Slot)
        id: deploy-to-staging
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'staging'
          package: ./publish

      - name: Run Integration Tests
        run: |
          # Adjust the filter or project path as necessary for your suite
          dotnet test --configuration Release --filter Category=IntegrationTests --logger "junit;LogFileName=test-results.xml" --results-directory ./test-results
        env:
          # Pass the staging URL to your tests
          STAGING_URL: ${{ steps.deploy-to-staging.outputs.webapp-url }}

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail
        with:
          name: integration-test-results
          path: ./test-results/test-results.xml

      - name: Publish Test Results to Summary
        uses: dorny/test-reporter@v1
        if: always() # Publish even if tests fail
        with:
          name: 'Integration Test Report'
          path: ./test-results/test-results.xml
          reporter: junit

      - name: Health Check Staging Slot
        run: |
          STAGING_URL="${{ steps.deploy-to-staging.outputs.webapp-url }}"
          HEALTH_ENDPOINT="$STAGING_URL/health" # IMPORTANT: Ensure your application has a /health endpoint
          echo "Checking health of staging slot at: $HEALTH_ENDPOINT"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_ENDPOINT)
            if [ "$STATUS" -eq 200 ]; then
              echo "Health check passed (HTTP 200) on attempt $i."
              exit 0
            else
              echo "Health check failed (HTTP $STATUS) on attempt $i. Retrying in 10 seconds..."
              sleep 10
            fi
          done
          echo "Health check failed after multiple attempts."
          exit 1

  promote-to-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: 'Production'
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap Staging to Production
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'staging' # Source slot
          target-slot: 'production' # Target slot