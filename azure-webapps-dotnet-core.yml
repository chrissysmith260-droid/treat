name: Build and deploy ASP.Net Core app to Azure Web App - treat

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: treat
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  DOTNET_VERSION: '8.0.x'
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

permissions:
  id-token: write
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Verify NPM Authentication
        run: npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Create Migration Bundle and Publish
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef migrations bundle --runtime linux-x64 -o ${{env.DOTNET_ROOT}}/myapp/efbundle
          dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  migrate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Whitelist Runner IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "RUNNER_IP=$IP" >> $GITHUB_ENV
          az sql server firewall-rule create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.AZURE_SQL_SERVER_NAME }} \
            --name GitHubActionsTempRule \
            --start-ip-address $IP \
            --end-ip-address $IP

      - name: Run Migration Bundle
        run: |
          chmod +x ./efbundle
          ./efbundle --connection "${{ secrets.SQL_CONNECTION_STRING }}"

      - name: Remove Firewall Rule
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.AZURE_SQL_SERVER_NAME }} \
            --name GitHubActionsTempRule

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment:
      name: 'Staging'
      url: ${{ steps.deploy-to-staging.outputs.webapp-url }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Staging Slot)
        id: deploy-to-staging
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'staging'
          package: ./publish

      - name: Run Integration Tests
        run: |
          # Adjust the filter or project path as necessary for your suite
          dotnet test --configuration Release --filter Category=IntegrationTests --logger "junit;LogFileName=test-results.xml" --results-directory ./test-results
        env:
          # Pass the staging URL to your tests
          STAGING_URL: ${{ steps.deploy-to-staging.outputs.webapp-url }}

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail
        with:
          name: integration-test-results
          path: ./test-results/test-results.xml

      - name: Publish Test Results to Summary
        uses: dorny/test-reporter@v1
        if: always() # Publish even if tests fail
        with:
          name: 'Integration Test Report'
          path: ./test-results/test-results.xml
          reporter: junit

      - name: Health Check Staging Slot
        run: |
          STAGING_URL="${{ steps.deploy-to-staging.outputs.webapp-url }}"
          HEALTH_ENDPOINT="$STAGING_URL/health" # IMPORTANT: Ensure your application has a /health endpoint
          echo "Checking health of staging slot at: $HEALTH_ENDPOINT"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_ENDPOINT)
            if [ "$STATUS" -eq 200 ]; then
              echo "Health check passed (HTTP 200) on attempt $i."
              exit 0
            else
              echo "Health check failed (HTTP $STATUS) on attempt $i. Retrying in 10 seconds..."
              sleep 10
            fi
          done
          echo "Health check failed after multiple attempts."
          exit 1

  promote-to-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: 'Production'
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap Staging to Production
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'staging' # Source slot
          target-slot: 'production' # Target slot