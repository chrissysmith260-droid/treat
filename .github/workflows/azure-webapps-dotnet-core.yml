name: Build and Deploy Treat App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: treat
  NODE_VERSION: '20.x'
  DOTNET_VERSION: '8.0'

permissions:
  id-token: write
  contents: read
  checks: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build with dotnet
        run: dotnet build ./treat.sln --configuration Release

      - name: Run C# Unit Tests
        run: dotnet test ./treat.sln --configuration Release --no-build

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Build Unified Project
        run: chmod +x ./build.sh && ./build.sh

      - name: Run React Unit Tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: treat-app-bundle
          path: .

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Staging'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: treat-app-bundle
          path: ./publish
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Swap Staging to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'staging'
          target-slot: 'production'
